<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Fatura Cartão de Credito</title>

   <script src="script.js" defer></script>
   <link rel="stylesheet" href="style.css" />

   <!-- pdf -->
   <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"
      integrity="sha512-MpDFIChbcXl2QgipQrt1VcPHMldRILetapBl5MPCA9Y8r7qvlwx1/Mc9hNTzY+kS5kX6PdoDq41ws1HiVNLdZA=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
   </script>

   <!-- Versão Completa do Font Awesome -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
   
   <!-- bootstrap -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
   
</head>

<body>

   <div id="container-header">

      <div id="content-header">
         <div id="info">
            <p>developed by RFagundes</p>
         </div>
         <div id="info">
            <p>version 1.26</p>
         </div>
      </div>

      <div id="content-header">
         <div id="content-year">
            <div>
               <input type="radio" name="opcao-year" id="radio-three" value="2025">
               <label for="radio-three">
                  2025
               </label>
            </div>
            <div>
               <input type="radio" name="opcao-year" id="radio-four" value="2026">
               <label for="radio-four">
                  2026
               </label>
            </div>
         </div>
         <div id="content-month">
            <select id="select-month"></select>
         </div>
      </div>

      <div id="content-header">
         <div id="content-type"></div>
         <div id="content-user">
            <select id="select-user"></select>
         </div>
      </div>

      <div id="content-btn">
         <button id="btn-pdf">
            <i class="fas fa-file-pdf" style="font-size:48px;color:white"></i>
         </button>
      </div>
   </div>

   <div id="container-list">

      <div id="content-list">
         <div>
            <p id="field-user"></p>
         </div>
         <div>
            <p id="field-expery"></p>
         </div>
         <div>
            <p id="field-amount"></p>
         </div>
      </div>

      <div id="container-table">
         <table id="table-list">
            <thead>
               <tr id="t-head">
                  <th>Date</th>
                  <th>Shop</th>
                  <th>Value</th>
                  <th>Desc</th>
                  <th>Parcel</th>
                  <th>Format</th>
               </tr>
            </thead>
            <tbody id="t-body"></tbody>
         </table>
      </div>

   </div>

</body>

</html>
